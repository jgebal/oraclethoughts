site_name: Oracle Thoughts
site_url: https://jgebal.github.io/oraclethoughts
site_author: Jacek Gebal
site_description: Oracle database, PL/SQL development, unit testing and utPLSQL
repo_url: https://github.com/jgebal/oraclethoughts
repo_name: jgebal/oraclethoughts
extra_css:
  - stylesheets/extra.css
theme:
  name: material
  logo: assets/logo-thinking-smile.png
  favicon: assets/logo-thinking-smile.png
  palette:
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: deep orange
    accent: orange
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: deep orange
    accent: orange
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
  - media: "(prefers-color-scheme)"
    accent: orange
    toggle:
      icon: material/brightness-auto
      name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github
plugins:
  - search
  - blog
  - tags
markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption
  - pymdownx.highlight
  - pymdownx.superfences: {}
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Blog:
      - blog/index.md
  - About: about.md
